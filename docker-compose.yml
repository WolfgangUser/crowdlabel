# 12-factor Factor IV: все сторонние сервисы подключаются через URL из env
# 12-factor Factor X: паритет dev/prod через единый compose файл

services:

  # ─── База данных ─────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-crowdlabel}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-crowdlabel_secret}
      POSTGRES_DB: ${POSTGRES_DB:-crowdlabel}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-crowdlabel}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Redis ───────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3

  # ─── Backend (FastAPI) ───────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      # 12-factor Factor III: конфигурация из env
      SECRET_KEY: ${SECRET_KEY:-dev-secret-key-change-in-production}
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-crowdlabel}:${POSTGRES_PASSWORD:-crowdlabel_secret}@postgres/${POSTGRES_DB:-crowdlabel}
      REDIS_URL: redis://redis:6379/0
      ALLOWED_ORIGINS: '["http://localhost:5173","http://localhost:3000"]'
      DEBUG: ${DEBUG:-false}
      ENVIRONMENT: ${ENVIRONMENT:-development}
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    # 12-factor Factor XI: логи в stdout
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # ─── Frontend (React + Vite) ─────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      VITE_API_URL: ${VITE_API_URL:-http://localhost:8000}
    ports:
      - "5173:80"
    depends_on:
      - backend

  # ─── Adminer (DB GUI для разработки) ─────────────────────────────────────
  adminer:
    image: adminer:latest
    restart: unless-stopped
    ports:
      - "8080:8080"
    depends_on:
      - postgres
    profiles:
      - dev

volumes:
  postgres_data:
