services:
  # ─── Backend ────────────────────────────────────────────────────────────────
  - type: web
    name: crowdlabel-backend
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    plan: free
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: crowdlabel-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: crowdlabel-redis
          type: redis
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: ALLOWED_ORIGINS
        value: https://crowdlabel-frontend.onrender.com

  # ─── Frontend ───────────────────────────────────────────────────────────────
  - type: web
    name: crowdlabel-frontend
    runtime: docker
    dockerfilePath: ./frontend/Dockerfile
    dockerContext: ./frontend
    plan: free
    envVars:
      - key: VITE_API_URL
        fromService:
          name: crowdlabel-backend
          type: web
          property: host

# ─── PostgreSQL ─────────────────────────────────────────────────────────────
databases:
  - name: crowdlabel-db
    plan: free

# ─── Redis ──────────────────────────────────────────────────────────────────
  - type: redis
    name: crowdlabel-redis
    plan: free
    ipAllowList: []
